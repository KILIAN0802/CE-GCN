name: Docker CI/CD for GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      - name: Update Kubernetes deployment
        env:
          NEW_TAG: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: |
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}.*|image: ${NEW_TAG}|g" k8s/deployment.yaml
          
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image tag to ${NEW_TAG} [skip ci]"
          git push origin main
        
      