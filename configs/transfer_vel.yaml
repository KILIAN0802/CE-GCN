work_dir: ./results/noJDMA/transfer_vel

# [CLONE] Dùng Joint model joint train - pretrain
pretrained_path: ./results/noJDMA/transfer_joint/best_model.pth

model: models.CTRGCN.CTRGCN.CTRGCN
model_args:
  num_class: 200
  num_point: 46
  num_person: 1
  in_channels: 9
  base_channel: 64
  drop_out: 0.5
  graph: models.graph.vsl_graph.Graph
  graph_args:
    strategy: 'spatial'
    layout: 'vsl_layout'

# Data Feeder (Giữ nguyên)
train_feeder: dataset.reader.FeatureReader
train_feeder_args:
  data_path: ./data/fused_features/train_fused_features
  split_file: ./data/fused_features/train_fused_features/train_label.csv
  num_classes: 200
  normalization: False
  random_choose: True
  random_shift: True
  random_move: False
  window_size: 64

val_feeder: dataset.reader.FeatureReader
val_feeder_args:
  data_path: ./data/fused_features/val_fused_features
  split_file: ./data/fused_features/val_fused_features/val_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

test_feeder: dataset.reader.FeatureReader
test_feeder_args:
  data_path: ./data/fused_features/test_fused_features
  split_file: ./data/fused_features/test_fused_features/test_label.csv
  num_classes: 200
  normalization: False
  window_size: 64
  test_batch_size: 32

use_mixup: False
loss_args:
  label_smoothing: 0.0

train:
  seed: 42
  device: [0]
  num_epoch: 50
  batch_size: 32
  num_workers: 4
  
  # [LƯU Ý] Velocity thường nhiễu hơn, nên LR thấp là tốt
  base_lr: 0.005      
  
  weight_decay: 0.0004
  step: [20, 40]
  warm_up_epoch: 5
  eval_interval: 1
  save_interval: 5