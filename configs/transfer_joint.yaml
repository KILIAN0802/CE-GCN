# ---------------------------------------------------------
# CONFIG: TRANSFER LEARNING - JOINT (STAGE 1)
# (Thực chất là 9-Channels Early Fusion)
# ---------------------------------------------------------
work_dir: ./results1/noJDMAreal/transfer_joint

# Đường dẫn file weight NTU
pretrained_path: ./checkpoints/ntu120_joint.pt #Transferlearning 

# 1. MODEL
model: models.CTRGCN.CTRGCN.CTRGCN
model_args:
  num_class: 200        
  num_point: 26         
  num_person: 1
  # [QUAN TRỌNG] Input 9 kênh (Joint + Bone + Velocity)
  # Model sẽ học tất cả các kênh này ngay từ đầu
  in_channels: 9        
  base_channel: 64
  drop_out: 0.5
  graph: models.graph.vsl_graph.Graph
  graph_args:
    strategy: 'spatial'
    layout: 'vsl_layout'

# 2. DATA
train_feeder: dataset.reader.FeatureReader
train_feeder_args:
  data_path: ./data/fused_features/train_fused_features
  split_file: ./data/fused_features/train_fused_features/train_label.csv
  num_classes: 200
  normalization: False
  random_choose: True
  random_shift: True
  random_move: False
  window_size: 64

val_feeder: dataset.reader.FeatureReader
val_feeder_args:
  data_path: ./data/fused_features/val_fused_features
  split_file: ./data/fused_features/val_fused_features/val_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

test_feeder: dataset.reader.FeatureReader
test_feeder_args:
  data_path: ./data/fused_features/test_fused_features
  split_file: ./data/fused_features/test_fused_features/test_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

# 3. TRAINING STRATEGY
use_mixup: False #JDMA
loss_args:
  label_smoothing: 0.0

train:
  seed: 42
  device: [0]
  num_epoch: 90
  batch_size: 32
  num_workers: 4
  base_lr: 0.01          
  weight_decay: 0.0004
  step: [40, 55]
  warm_up_epoch: 5
  eval_interval: 1
  save_interval: 5

test:
  test_batch_size: 32