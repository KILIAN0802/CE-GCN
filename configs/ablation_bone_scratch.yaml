# ---------------------------------------------------------
# CONFIG: BONE ONLY - FROM SCRATCH (ABLATION STUDY)
# ---------------------------------------------------------
work_dir: ./results/ablation/bone_scratch

# pretrained_path: ./checkpoints/ntu120_joint.pt 

# 1. MODEL

model: models.CTRGCN.ctrgcn_baseline.Model
model_args:
  num_class: 200
  num_point: 46
  num_person: 1
  
  # [MẤU CHỐT] Báo cho model biết hãy cắt lấy luồng Bone
  select_stream: 'bone'
  
  # Input thực tế vào mạng sau khi cắt là 3 kênh
  in_channels: 3        
  
  base_channel: 64
  drop_out: 0.5
  graph: models.graph.vsl_graph.Graph
  graph_args:
    strategy: 'spatial'
    layout: 'vsl_layout'

# 2. DATA (Vẫn load file 9 kênh, Model sẽ tự cắt)
train_feeder: dataset.reader.FeatureReader
train_feeder_args:
  data_path: ./data/fused_features/train_fused_features
  split_file: ./data/fused_features/train_fused_features/train_label.csv
  num_classes: 200
  normalization: False
  random_choose: True
  random_shift: True
  random_move: False
  window_size: 64

val_feeder: dataset.reader.FeatureReader
val_feeder_args:
  data_path: ./data/fused_features/val_fused_features
  split_file: ./data/fused_features/val_fused_features/val_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

test_feeder: dataset.reader.FeatureReader
test_feeder_args:
  data_path: ./data/fused_features/test_fused_features
  split_file: ./data/fused_features/test_fused_features/test_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

# 3. TRAINING STRATEGY (From Scratch)
use_mixup: False
loss_args:
  label_smoothing: 0.0

train:
  seed: 42
  device: [1]
  num_epoch: 60       # 60 epoch là đủ thấy kết quả
  batch_size: 32
  num_workers: 4
  
  # [SCRATCH] LR cao (0.1) vì train từ đầu
  base_lr: 0.1        
  weight_decay: 0.0004
  step: [35, 45]
  warm_up_epoch: 5
  
  eval_interval: 1
  save_interval: 5

test:
  test_batch_size: 32