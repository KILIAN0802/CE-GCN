# ---------------------------------------------------------
# ABLATION: JOINT ONLY (FROM SCRATCH)
# ---------------------------------------------------------
work_dir: ./results/ablation/joint_scratch

# KHÔNG dùng pretrained
# pretrained_path: ...

model: models.CTRGCN.ctrgcn_baseline.Model
model_args:
  num_class: 200
  num_point: 46
  num_person: 1
  
  # [QUAN TRỌNG] Chỉ định cắt lấy Joint Stream
  select_stream: 'joint'  
  in_channels: 3        # Model sẽ khởi tạo layer đầu với 3 kênh
  
  base_channel: 64
  drop_out: 0.5
  graph: models.graph.vsl_graph.Graph
  graph_args:
    strategy: 'spatial'
    layout: 'vsl_layout'

# DATA (Vẫn load file 9 kênh, nhưng model sẽ tự cắt)
train_feeder: dataset.reader.FeatureReader
train_feeder_args:
  data_path: ./data/fused_features/train_fused_features
  split_file: ./data/fused_features/train_fused_features/train_label.csv
  num_classes: 200
  normalization: False
  random_choose: True
  random_shift: True
  random_move: False
  window_size: 64

val_feeder: dataset.reader.FeatureReader
val_feeder_args:
  data_path: ./data/fused_features/val_fused_features
  split_file: ./data/fused_features/val_fused_features/val_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

test_feeder: dataset.reader.FeatureReader
test_feeder_args:
  data_path: ./data/fused_features/test_fused_features
  split_file: ./data/fused_features/test_fused_features/test_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

# TRAINING (Baseline settings)
use_mixup: False
loss_args:
  label_smoothing: 0.0

train:
  seed: 42
  device: [0]
  num_epoch: 60
  num_workers: 4
  batch_size: 32
  base_lr: 0.1          # LR cao cho train scratch
  weight_decay: 0.0004
  step: [35, 45]
  warm_up_epoch: 5
  eval_interval: 1
  save_interval: 5

test:
  test_batch_size: 32