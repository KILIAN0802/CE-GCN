# ---------------------------------------------------------
# CONFIG: CTR-GCN BASELINE (FROM SCRATCH)
# ---------------------------------------------------------
work_dir: ./results/baselines/ctrgcn_scratch

# From Scratch -> KHÔNG pretrained_path

# 1. MODEL
model: models.CTRGCN.ctrgcn_baseline.Model
model_args:
  num_class: 200
  num_point: 46         # VSL 46 khớp
  num_person: 1
  in_channels: 9        # Input 9 kênh
  base_channel: 64      
  drop_out: 0.5
  
  graph: models.graph.vsl_graph.Graph
  graph_args:
    layout: 'vsl_layout'
    strategy: 'spatial'

# 2. DATA (Giữ nguyên pipeline)
train_feeder: dataset.reader.FeatureReader
train_feeder_args:
  data_path: ./data/fused_features/train_fused_features
  split_file: ./data/fused_features/train_fused_features/train_label.csv
  num_classes: 200
  normalization: False
  random_choose: True
  random_shift: True
  random_move: False
  window_size: 64

val_feeder: dataset.reader.FeatureReader
val_feeder_args:
  data_path: ./data/fused_features/val_fused_features
  split_file: ./data/fused_features/val_fused_features/val_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

test_feeder: dataset.reader.FeatureReader
test_feeder_args:
  data_path: ./data/fused_features/test_fused_features
  split_file: ./data/fused_features/test_fused_features/test_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

# 3. TRAINING STRATEGY (Baseline thuần túy)
# Tắt hết các kỹ thuật nâng cao để công bằng với ST-GCN/2s-AGCN
use_mixup: False        
loss_args:
  label_smoothing: 0.0

train:
  seed: 42
  device: [1]
  num_epoch: 60         # Train from scratch cần 60 epoch
  batch_size: 32
  num_workers: 4
  
  # [QUAN TRỌNG] From scratch LR = 0.1 (0.01 sẽ quá thấp)
  base_lr: 0.1          
  weight_decay: 0.0004
  step: [35, 45]
  warm_up_epoch: 5
  
  eval_interval: 1
  save_interval: 5

test:
  test_batch_size: 32