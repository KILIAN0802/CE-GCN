# ---------------------------------------------------------
# CONFIG: ST-GCN BASELINE (FROM SCRATCH)
# ---------------------------------------------------------
work_dir: ./results/baselines/st_gcn_scratch

# [QUAN TRỌNG] From Scratch -> KHÔNG CÓ pretrained_path
# pretrained_path: ./checkpoints/ntu120_joint.pt  <-- ĐÃ BỎ

# 1. MODEL: ST-GCN Gốc
model: models.ST-GCN.st-gcn.Model
model_args:
  in_channels: 9        # Vẫn dùng dữ liệu 9 kênh của bạn để công bằng input
  num_class: 200
  num_point: 46      
  edge_importance_weighting: True
  
  graph: models.graph.vsl_graph.Graph
  graph_args:
    strategy: 'spatial'
    layout: 'vsl_layout'

# 2. DATA (Copy y nguyên từ config của bạn - Giữ nguyên input pipeline)
train_feeder: dataset.reader.FeatureReader
train_feeder_args:
  data_path: ./data/fused_features/train_fused_features
  split_file: ./data/fused_features/train_fused_features/train_label.csv
  num_classes: 200
  normalization: False
  random_choose: True
  random_shift: True
  random_move: False
  window_size: 64

val_feeder: dataset.reader.FeatureReader
val_feeder_args:
  data_path: ./data/fused_features/val_fused_features
  split_file: ./data/fused_features/val_fused_features/val_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

test_feeder: dataset.reader.FeatureReader
test_feeder_args:
  data_path: ./data/fused_features/test_fused_features
  split_file: ./data/fused_features/test_fused_features/test_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

# 3. TRAINING STRATEGY (Baseline thuần túy)
use_mixup: False        # [QUAN TRỌNG] Tắt Mixup
loss_args:
  label_smoothing: 0.0  # [QUAN TRỌNG] Tắt Label Smoothing (về 0)

train:
  seed: 42
  device: [0]           # Chỉnh lại GPU ID nếu cần
  num_epoch: 60         # Train from scratch cần khoảng 50-60 epoch
  batch_size: 32
  num_workers: 4
  
  # [QUAN TRỌNG] Train từ đầu phải để LR cao (0.1)
  base_lr: 0.1          
  weight_decay: 0.0004
  step: [35, 45]        # Step decay tiêu chuẩn
  warm_up_epoch: 5
  
  eval_interval: 1
  save_interval: 5

test:
  test_batch_size: 32