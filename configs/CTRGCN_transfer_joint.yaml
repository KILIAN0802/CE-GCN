# ---------------------------------------------------------
# CONFIG: CTR-GCN BASELINE - STANDARD TRANSFER (JOINT ONLY)
# ---------------------------------------------------------
work_dir: ./results/ablation/joint_transfer_ntu

# Load pretrained weights từ NTU120 (Joint stream – 3 channels)
pretrained_path: ./checkpoints/ntu120_joint.pt

model: models.CTRGCN.ctrgcn_baseline.Model
model_args:
  num_class: 200
  num_point: 46
  num_person: 1
  
  # Joint-only stream
  select_stream: 'joint'
  in_channels: 3       
  
  base_channel: 64
  drop_out: 0.5
  
  graph: models.graph.vsl_graph.Graph
  graph_args:
    strategy: 'spatial'
    layout: 'vsl_layout'

# DATA (load 9-channel fused features, model selects Joint internally)
train_feeder: dataset.reader.FeatureReader
train_feeder_args:
  data_path: ./data/fused_features/train_fused_features
  split_file: ./data/fused_features/train_fused_features/train_label.csv
  num_classes: 200
  normalization: False
  random_choose: True
  random_shift: True
  random_move: False
  window_size: 64

val_feeder: dataset.reader.FeatureReader
val_feeder_args:
  data_path: ./data/fused_features/val_fused_features
  split_file: ./data/fused_features/val_fused_features/val_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

test_feeder: dataset.reader.FeatureReader
test_feeder_args:
  data_path: ./data/fused_features/test_fused_features
  split_file: ./data/fused_features/test_fused_features/test_label.csv
  num_classes: 200
  normalization: False
  window_size: 64

# TRAINING STRATEGY (Standard Transfer – NO JDMA)
use_mixup: False
loss_args:
  label_smoothing: 0.0

train:
  seed: 42
  device: [0]
  num_epoch: 60
  batch_size: 32
  num_workers: 4
  
  # Lower LR for transfer learning
  base_lr: 0.01
  weight_decay: 0.0004
  step: [35, 45]
  warm_up_epoch: 5
  
  eval_interval: 1
  save_interval: 5

test:
  test_batch_size: 32
